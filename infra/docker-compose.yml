version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: mini-pay-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mini_pay
    ports:
      - '15432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: mini-pay-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  ngrinder-controller:
    image: ngrinder/controller:3.5.9-p1
    container_name: mini-pay-ngrinder-controller
    restart: unless-stopped
    ports:
      - '8080:80'
      - '16001:16001'
      - '12000-12009:12000-12009'
    volumes:
      - ngrinder_controller_data:/opt/ngrinder-controller

  ngrinder-agent:
    image: ngrinder/agent:3.5.9-p1
    container_name: mini-pay-ngrinder-agent
    restart: unless-stopped
    depends_on:
      - ngrinder-controller
    command: ['ngrinder-controller:80']

volumes:
  postgres_data:
  redis_data:
  ngrinder_controller_data:
